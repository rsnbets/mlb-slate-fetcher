name: MLB slate fetch

on:
  schedule:
    - cron: '0 * * * *'      # hourly (GitHub throttles sub-hourly schedules anyway). Public repo → free.
  workflow_dispatch: {}       # manual run from the Actions tab

concurrency:
  group: slate-fetch
  cancel-in-progress: false   # never overlap a publish

permissions:
  contents: write             # push the public odds feed to this repo's gh-pages

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pull SGO slate (the ONLY SportsGameOdds call in the whole stack)
        env:
          SGO_API_KEY: ${{ secrets.SGO_API_KEY }}
        run: python fetch.py

      - name: Publish slate to mlb-odds (single force-pushed commit → no history bloat)
        run: |
          [ -f mlb_slate.json ] || { echo "no slate file — fetch failed"; exit 1; }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SLATE_WRITE_KEY }}" > ~/.ssh/slate_key
          chmod 600 ~/.ssh/slate_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/slate_key -o StrictHostKeyChecking=no"
          rm -rf /tmp/slate
          git clone -q --depth 1 git@github.com:rsnbets/mlb-odds.git /tmp/slate
          cp mlb_slate.json /tmp/slate/
          cd /tmp/slate
          git config user.name "slate-bot"
          git config user.email "actions@users.noreply.github.com"
          git add mlb_slate.json
          if git diff --cached --quiet; then
            echo "slate unchanged — nothing to publish"
          else
            git commit -q --amend -m "slate $(date -u '+%Y-%m-%dT%H:%MZ')" --reset-author
            git push -qf origin main
            echo "slate published to mlb-odds"
          fi

      - name: Publish live odds feed to gh-pages (public, CORS — for client-side boards)
        run: |
          [ -f board_odds.json ] || { echo "no board_odds.json — skipping"; exit 0; }
          tmpd=$(mktemp -d); cp board_odds.json "$tmpd/"
          cd "$tmpd"
          git init -q && git checkout -q -b gh-pages
          git add board_odds.json
          git -c user.name=slate-bot -c user.email=actions@users.noreply.github.com \
            commit -q -m "odds $(date -u '+%Y-%m-%dT%H:%MZ')"
          git push -qf "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          echo "live odds feed published to gh-pages"
